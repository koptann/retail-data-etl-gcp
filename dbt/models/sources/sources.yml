# sources.yml
version: 2

sources:
  - name: mtech_retail_dsy
    database: "{{ env_var('GCP_PROJECT_ID', 'mtech-retail-etl') }}"  # Reads from env var, fallback to default
    schema: mtech_retail_dsy # BigQuery dataset name
    description: "Raw data loaded from GCS via Cloud Workflows"

    tables:
      - name: raw_invoice
        description: "Retail transaction data"
        columns:
          - name: InvoiceNo
            description: "Unique transaction identifier"
          - name: CustomerID
            description: "Customer identifier"
          - name: Country
            description: "Customer country"
      - name: raw_country
        description: "Country reference data with ISO codes"
        columns:
          - name: iso
            description: "2-letter ISO country code"
          - name: nicename
            description: "Country display name"