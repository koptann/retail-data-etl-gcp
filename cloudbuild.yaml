# =============================================================================
# CLOUD BUILD CONFIGURATION - GitOps CI/CD Pipeline
# =============================================================================
# Triggered automatically on git push to main branch
#
# Pipeline Flow:
# 1. Initialize Terraform with remote state
# 2. Configure Docker authentication for Artifact Registry
# 3. Build dbt Docker image (tagged with git SHA + latest)
# 4. Run Terraform plan with new image
# 5. Apply Terraform changes (infrastructure + image update)
#
# Service Accounts:
# - cloudbuild-sa: Runs this entire pipeline (infrastructure manager)
# - retail-etl-sa: Runs workflows and Cloud Run jobs (runtime)
# - dbt-runner: Executes dbt transformations (data operations)
# =============================================================================

steps:
  # ===========================================================================
  # STEP 1: Initialize Terraform
  # ===========================================================================
  - name: hashicorp/terraform:1.6.6
    id: terraform-init
    dir: infra
    entrypoint: sh
    args:
      - -c
      - |
        terraform init \
          -backend-config="bucket=${_TF_STATE_BUCKET}" \
          -backend-config="prefix=${_TF_STATE_PREFIX}"

  # ===========================================================================
  # STEP 2: Configure Docker for Artifact Registry
  # ===========================================================================
  - name: gcr.io/cloud-builders/gcloud
    id: configure-docker
    args:
      - auth
      - configure-docker
      - "${_AR_REGION}-docker.pkg.dev"
      - --quiet

  # ===========================================================================
  # STEP 3: Build and Push dbt Docker Image
  # ===========================================================================
  - name: gcr.io/cloud-builders/docker
    id: build-dbt-image
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        
        # Image names with git SHA and latest tags
        SHA_IMAGE="${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_DBT_IMAGE_NAME}:${SHORT_SHA}"
        LATEST_IMAGE="${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_DBT_IMAGE_NAME}:latest"
        
        # Build dbt image with both tags
        echo "Building dbt image: $$SHA_IMAGE"
        docker build -f dbt/Dockerfile -t "$$SHA_IMAGE" -t "$$LATEST_IMAGE" dbt
        
        # Push versioned image
        echo "Pushing versioned image: $$SHA_IMAGE"
        docker push "$$SHA_IMAGE"
        
        # Push latest tag
        echo "Pushing latest tag: $$LATEST_IMAGE"
        docker push "$$LATEST_IMAGE"
        
        echo "✅ Image successfully built and tagged with SHA: ${SHORT_SHA}"

  # ===========================================================================
  # STEP 4: Terraform Plan
  # ===========================================================================
  - name: hashicorp/terraform:1.6.6
    id: terraform-plan
    dir: infra
    entrypoint: sh
    args:
      - -c
      - |
        terraform plan \
          -var="project_id=${PROJECT_ID}" \
          -var="dbt_image=${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_DBT_IMAGE_NAME}:${SHORT_SHA}" \
          -out=tfplan

  # ===========================================================================
  # STEP 5: Terraform Apply
  # ===========================================================================
  - name: hashicorp/terraform:1.6.6
    id: terraform-apply
    dir: infra
    entrypoint: sh
    args:
      - -c
      - |
        echo "Applying Terraform changes..."
        terraform apply -auto-approve tfplan
        echo "✅ Infrastructure deployment complete"

# =============================================================================
# SUBSTITUTION VARIABLES
# =============================================================================
# NOTE: These default values are OVERRIDDEN by the Cloud Build trigger
# See: infra/modules/platform/main.tf (google_cloudbuild_trigger.main_branch_deploy)
# The trigger passes actual values from terraform.tfvars at runtime

substitutions:
  _TF_STATE_BUCKET: override-from-trigger  # Actual value from var.tf_state_bucket
  _TF_STATE_PREFIX: override-from-trigger  # Actual value from var.tf_state_prefix
  _AR_REGION: override-from-trigger        # Actual value from var.region
  _AR_REPO: override-from-trigger          # Actual value from var.ar_repo_name
  _DBT_IMAGE_NAME: dbt-etl-job             # Static image name

# =============================================================================
# BUILD OPTIONS
# =============================================================================

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8 # Faster builds
  timeout: 1200s # 20 minutes max
